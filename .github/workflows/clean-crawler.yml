name: Check In

# ✅ 签到续期：运行此 workflow 可重置 1 个自然月计时，保持 "Get Hot News" 正常运行
# ✅ Renewal: Run this workflow to reset the 1-calendar-month timer and keep "Get Hot News" active
#
# 📌 操作方法 / How to use:
#   1. 点击 "Run workflow" 按钮 / Click "Run workflow" button
#   2. 每 1 个自然月内至少运行一次 / Run at least once every calendar month

on:
  schedule:
    # 每月 1 日 UTC 00:00 自动签到续期
    # Automatically renew on the 1st day of every month at 00:00 UTC
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete all workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_by_state_pattern: "ALL"
          delete_run_by_conclusion_pattern: "ALL"
